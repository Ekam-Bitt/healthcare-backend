[flake8]
max-line-length = 120
exclude =
    venv,
    migrations,
    __pycache__,
    manage.py
extend-ignore = E203, W503

[isort]
profile = black
line_length = 120
known_third_party = django,rest_framework,rest_framework_simplejwt,decouple,corsheaders
known_first_party = accounts,patients,doctors,mappings,core
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
